<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link
    href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
    rel="stylesheet"
    />
    <title>Notes</title>
</head>
<body>
    <header>
        <div class="header-container">
            <div class="left-nav">
            <h1>
                my<span>notes</span>
            </h1>
            <small>YOUR PERSONEL NOTEPAD</small>
            </div>
            <div class="nav">
                <i class="ri-search-line searchIcon"></i>
                <input type="text" class="searchBar" placeholder="Search notes...">
                <button id="newNote">+ New Note</button>
            </div>
        </div>
    </header>

    <main>
        <div class="count-div">
            <span id="noteCounter">0</span>
            Notes 
        </div>

        <div class="empty-notes-display">
            <p id="noteEmoji">📋</p>
            <h1>No notes yet</h1>
            <p id="empty-notes-subtitle">Hit "New Note" to capture your first thought.</p>
        </div>

        <div class="notes-container">
            
        </div>

    </main>
    <div class="modal-overlay">
        <div class="modal-container">
                <h2>New Note</h2>
                <div class="field">
                    <label for="inputTitle">TITLE</label>
                    <input id="inputTitle" type="text" placeholder="Give it a name" maxlength="50">
                </div>
                <div class="field">
                    <label for="inputContent">CONTENT</label>
                    <textarea id="inputContent" placeholder="Write something..."></textarea>
                </div>
                <div class="modal-buttons">
                    <button id="cancel">Cancel</button>
                    <button id="save">Save</button>
                </div>
            </div>
        </div>
    <script src="script.js"></script>
</body>
</html>
